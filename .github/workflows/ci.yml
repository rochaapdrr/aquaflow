name: CI - AquaFlow

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Passo 1 - Clonar o repositório
        uses: actions/checkout@v4

      - name: Passo 2 - Configurar o Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Passo 3 - Executar Análise Estática (Linting)
        run: mvn checkstyle:check

      - name: Passo 4 - Executar Testes Automatizados
        run: ./mvnw test